spring.application.name=gerador-ia-code-interpreter
spring.config.import=optional:file:.env[.properties]
server.port=8080

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.code-interpreter-memory=${OPENAI_CODE_INTERPRETER_MEMORY:1g}
app.max-attachment-bytes=${MAX_ATTACHMENT_BYTES:5242880}
app.max-attachment-chars=${MAX_ATTACHMENT_CHARS:60000}

app.prompt-file=${PROMPT_FILE:data/prompts.txt}
app.generated-files-dir=${GENERATED_FILES_DIR:data/generated}
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080}
